<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esteem</title>
  <link rel="icon" type="image/png" href="esteem_icon.png.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="panel">
    <div class="section">
      <h2 class="section-title">COLOR EXTERIOR</h2>
      <div class="colors">
        <button class="swatch black" onclick="changeHull('#0b0b0b')"></button>
        <button class="swatch grey" onclick="changeHull('#141414')"></button>
        <button class="swatch white" onclick="changeHull('#f1f1f1')"></button>
        <button class="swatch red" onclick="changeHull('#ff0000')"></button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">COLOR INTERIOR</div>
      <div class="colors">
        <button class="swatch black" onclick="changeInterior('#101010')"></button>
        <button class="swatch grey" onclick="changeInterior('#3f3f3f')"></button>
        <button class="swatch caramel" onclick="changeInterior('#c68642')"></button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">WAKE</div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="wake-on" onclick="setWake(true)">ON</button>
        <button class="toggle-btn" id="wake-off" onclick="setWake(false)">OFF</button>
      </div>
    </div>
  </div>

  <model-viewer
    id="boat"
    src="Z1_WEB_V5.glb"
    alt="boat"
    shadow-intensity="1"
    camera-controls
    camera-orbit="90deg 75deg 3m"
    style="width:100vw; height:100vh;"
  >
  </model-viewer>

  <script>
    console.log("SCRIPT CARGADO");

    function changeHull(color) {
      const viewer = document.querySelector("#boat");

      if (!viewer.model) {
        alert("El modelo todavía no terminó de cargar");
        return;
      }

      const hullMaterial = viewer.model.materials.find(
        m => m.name === "Material.004"
      );

      if (!hullMaterial) {
        alert("No encontré el material Material.004");
        return;
      }

      const r = parseInt(color.substring(1, 3), 16) / 255;
      const g = parseInt(color.substring(3, 5), 16) / 255;
      const b = parseInt(color.substring(5, 7), 16) / 255;

      hullMaterial.pbrMetallicRoughness.setBaseColorFactor([r, g, b, 1]);
    }

    function changeInterior(color) {
      const viewer = document.querySelector("#boat");

      if (!viewer.model) {
        alert("El modelo todavía no terminó de cargar");
        return;
      }

      const interior1 = viewer.model.materials.find(
        m => m.name === "Phong_737373_r0.90"
      );

      const interior2 = viewer.model.materials.find(
        m => m.name === "Standard_3A3A3A"
      );

      const interior3 = viewer.model.materials.find(
        m => m.name === "Phong_414141_r0.90"
      );

      const r = parseInt(color.substring(1, 3), 16) / 255;
      const g = parseInt(color.substring(3, 5), 16) / 255;
      const b = parseInt(color.substring(5, 7), 16) / 255;

      if (interior1) {
        interior1.pbrMetallicRoughness.setBaseColorFactor([r, g, b, 1]);
      }

      if (interior2) {
        interior2.pbrMetallicRoughness.setBaseColorFactor([r, g, b, 1]);
      }

      if (interior3) {
        interior3.pbrMetallicRoughness.setBaseColorFactor([r, g, b, 1]);
      }
    }

    function applyWakeMaterial(material, show) {
      if (!material) return;

      console.log("Aplicando wake a:", material.name, "show:", show);

      const c = material.pbrMetallicRoughness.baseColorFactor;

      if (show) {
        if (typeof material.setAlphaMode === "function") {
          material.setAlphaMode("OPAQUE");
        } else {
          material.alphaMode = "OPAQUE";
        }

        material.pbrMetallicRoughness.setBaseColorFactor([
          c[0],
          c[1],
          c[2],
          1
        ]);
      } else {
        if (typeof material.setAlphaMode === "function") {
          material.setAlphaMode("MASK");
        } else {
          material.alphaMode = "MASK";
        }

        if ("alphaCutoff" in material) {
          material.alphaCutoff = 0.5;
        }

        material.pbrMetallicRoughness.setBaseColorFactor([
          c[0],
          c[1],
          c[2],
          0
        ]);
      }
    }

    function toggleWake(state) {
      const viewer = document.querySelector("#boat");

      if (!viewer.model) {
        alert("El modelo todavía no terminó de cargar");
        return;
      }

      const wake1 = viewer.model.materials.find(
        m => m.name === "Standard_373737"
      );

      const wake2 = viewer.model.materials.find(
        m => m.name === "Material.005"
      );

      const wake3 = viewer.model.materials.find(
        m => m.name === "Material.006"
      );

      applyWakeMaterial(wake1, state);
      applyWakeMaterial(wake2, state);
      applyWakeMaterial(wake3, state);
    }

    function setWake(state) {
      toggleWake(state);

      const onBtn = document.querySelector("#wake-on");
      const offBtn = document.querySelector("#wake-off");

      if (state) {
        onBtn.classList.add("active");
        offBtn.classList.remove("active");
      } else {
        offBtn.classList.add("active");
        onBtn.classList.remove("active");
      }
    }
  </script>

  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
  ></script>
  <img src="esteem_logo.png" class="esteem-logo">
</body>

</html>
