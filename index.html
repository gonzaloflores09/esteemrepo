<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esteem</title>
  <link rel="icon" type="image/png" href="esteem_icon.png.png" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="top-logo-container">
    <img src="esteem_logo.png" class="top-logo" alt="Esteem logo" />
  </div>

  <div id="intro">
    <div class="intro-overlay">
      <img src="esteem_logo.png" class="intro-logo" alt="Esteem intro logo" />
    </div>
  </div>

  <div id="sidebar" class="sidebar">
    <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Expandir o contraer panel">
      <span class="toggle-icon">‹</span>
    </button>

    <div class="sidebar-inner">
      <div class="panel">
        <div class="section">
          <h2 class="section-title">COLOR EXTERIOR</h2>
          <div class="colors">
            <button class="swatch exterior-swatch black active" onclick="setHull(this, '#0b0b0b')"></button>
            <button class="swatch exterior-swatch grey" onclick="setHull(this, '#141414')"></button>
            <button class="swatch exterior-swatch white" onclick="setHull(this, '#f1f1f1')"></button>
            <button class="swatch exterior-swatch red" onclick="setHull(this, '#ff0000')"></button>
          </div>
        </div>

        <div class="section">
          <div class="section-title">COLOR INTERIOR</div>
          <div class="colors">
            <button class="swatch interior-swatch black active" onclick="setInterior(this, '#101010')"></button>
            <button class="swatch interior-swatch grey" onclick="setInterior(this, '#3f3f3f')"></button>
            <button class="swatch interior-swatch white" onclick="setInterior(this, '#f1f1f1')"></button>
            <button class="swatch interior-swatch caramel" onclick="setInterior(this, '#c68642')"></button>
          </div>
        </div>

        <div class="section">
          <div class="section-title">WAKE TOWER</div>
          <div class="toggle-group">
            <button class="toggle-btn active" id="wake-on" onclick="setWake(true)">SÍ</button>
            <button class="toggle-btn" id="wake-off" onclick="setWake(false)">NO</button>
          </div>
        </div>
      </div>

      <div class="action-panel">
        <div class="action-block">
          <div class="action-title">GUARDAR CONFIGURACIÓN</div>
          <button id="copyBtn" class="action-btn" onclick="copyConfigLink()">
            COPIAR LINK
          </button>
        </div>

        <div class="action-block">
          <div class="action-title">SOLICITAR COTIZACIÓN</div>
          <button class="action-btn primary" onclick="openQuoteModal()">
            SOLICITAR
          </button>
        </div>

        <div class="action-block">
          <div class="action-title">DESCARGAR IMAGEN</div>
          <button class="action-btn" onclick="captureBoatImage()">
            CAPTURAR DISEÑO
          </button>
        </div>
      </div>
    </div>
  </div>

  <model-viewer
    id="boat"
    src="Z1_WEB_V5.glb"
    alt="Lancha"
    shadow-intensity="1.5"
    exposure="0.6"
    shadow-softness="0.8"
    camera-controls
    camera-orbit="90deg 75deg 3m"
    max-camera-orbit="auto 87deg auto"
    style="width:100vw; height:100vh;"
  ></model-viewer>

  <div id="quoteModal" class="quote-modal">
    <div class="quote-box">
      <button class="quote-close" onclick="closeQuoteModal()">×</button>
      <h3>SOLICITAR COTIZACIÓN</h3>

      <form id="quoteForm" action="https://formspree.io/f/mlgplpwn" method="POST">
        <input type="text" name="nombre" placeholder="Tu nombre" required>
        <input type="email" name="email" placeholder="Tu email" required>
        <textarea name="mensaje" placeholder="Mensaje (opcional)"></textarea>

        <input type="hidden" name="color_exterior" id="quoteExterior">
        <input type="hidden" name="color_interior" id="quoteInterior">
        <input type="hidden" name="wake_tower" id="quoteWake">
        <input type="hidden" name="link_configuracion" id="quoteConfigLink">

        <button type="submit" class="toggle-btn">ENVIAR SOLICITUD</button>
      </form>

      <div id="quoteSuccess" class="quote-success">✓ Solicitud enviada</div>
    </div>
  </div>

  <div id="colorFade"></div>
  <div class="vignette"></div>
  <div class="noise"></div>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <script>
    let currentHullColor = "#0b0b0b";
    let currentInteriorColor = "#101010";
    let currentWakeState = true;
    let nudgeFrame = null;

    function updateConfigURL() {
      const params = new URLSearchParams();
      params.set("exterior", currentHullColor.replace("#", ""));
      params.set("interior", currentInteriorColor.replace("#", ""));
      params.set("wake", currentWakeState ? "on" : "off");

      const newURL = `${window.location.pathname}?${params.toString()}`;
      window.history.replaceState({}, "", newURL);
    }

    function loadConfigFromURL() {
      const params = new URLSearchParams(window.location.search);

      const exterior = params.get("exterior");
      const interior = params.get("interior");
      const wake = params.get("wake");

      if (exterior) currentHullColor = `#${exterior}`;
      if (interior) currentInteriorColor = `#${interior}`;
      if (wake) currentWakeState = wake === "on";
    }

    function copyConfigLink() {
      navigator.clipboard.writeText(window.location.href);

      const btn = document.getElementById("copyBtn");
      btn.innerHTML = "✓ LINK COPIADO";
      btn.classList.add("copy-success");

      setTimeout(() => {
        btn.innerHTML = "COPIAR LINK";
        btn.classList.remove("copy-success");
      }, 2000);
    }

    function openQuoteModal() {
      document.getElementById("quoteExterior").value = currentHullColor;
      document.getElementById("quoteInterior").value = currentInteriorColor;
      document.getElementById("quoteWake").value = currentWakeState ? "ON" : "OFF";
      document.getElementById("quoteConfigLink").value = window.location.href;

      document.getElementById("quoteModal").classList.add("open");
    }

    function closeQuoteModal() {
      document.getElementById("quoteModal").classList.remove("open");
    }

    function setupQuoteForm() {
      const form = document.getElementById("quoteForm");
      const success = document.getElementById("quoteSuccess");

      if (!form) return;

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = new FormData(form);

        try {
          const response = await fetch(form.action, {
            method: "POST",
            body: data,
            headers: {
              "Accept": "application/json"
            }
          });

          const result = await response.json();

          if (response.ok) {
            form.reset();
            success.classList.add("show");

            setTimeout(() => {
              success.classList.remove("show");
              closeQuoteModal();
            }, 1800);
          } else {
            alert(result?.errors?.[0]?.message || "No se pudo enviar la solicitud");
          }
        } catch (error) {
          console.error("Error enviando formulario:", error);
          alert("Error de conexión al enviar la solicitud");
        }
      });
    }

    function hexToRgbFactor(color) {
      const r = parseInt(color.substring(1, 3), 16) / 255;
      const g = parseInt(color.substring(3, 5), 16) / 255;
      const b = parseInt(color.substring(5, 7), 16) / 255;
      return [r, g, b, 1];
    }

    function changeHull(color) {
      const viewer = document.querySelector("#boat");
      if (!viewer.model) return;

      const hullMaterial = viewer.model.materials.find(
        m => m.name === "Material.004"
      );
      if (!hullMaterial) return;

      hullMaterial.pbrMetallicRoughness.setBaseColorFactor(hexToRgbFactor(color));
    }

    function changeInterior(color) {
      const viewer = document.querySelector("#boat");
      if (!viewer.model) return;

      const interior1 = viewer.model.materials.find(
        m => m.name === "Phong_737373_r0.90"
      );
      const interior2 = viewer.model.materials.find(
        m => m.name === "Standard_3A3A3A"
      );
      const interior3 = viewer.model.materials.find(
        m => m.name === "Phong_414141_r0.90"
      );

      const rgba = hexToRgbFactor(color);

      if (interior1) interior1.pbrMetallicRoughness.setBaseColorFactor(rgba);
      if (interior2) interior2.pbrMetallicRoughness.setBaseColorFactor(rgba);
      if (interior3) interior3.pbrMetallicRoughness.setBaseColorFactor(rgba);
    }

    function animateColorChange(color, applyFunction) {
      const fade = document.getElementById("colorFade");

      fade.style.background = "#000";
      fade.style.opacity = "0.20";

      setTimeout(() => {
        applyFunction(color);
      }, 150);

      setTimeout(() => {
        fade.style.opacity = "0";
      }, 600);
    }

    function applyWakeMaterial(material, show) {
      if (!material) return;

      const c = material.pbrMetallicRoughness.baseColorFactor;

      if (show) {
        if (typeof material.setAlphaMode === "function") {
          material.setAlphaMode("OPAQUE");
        } else {
          material.alphaMode = "OPAQUE";
        }

        material.pbrMetallicRoughness.setBaseColorFactor([c[0], c[1], c[2], 1]);
      } else {
        if (typeof material.setAlphaMode === "function") {
          material.setAlphaMode("MASK");
        } else {
          material.alphaMode = "MASK";
        }

        if ("alphaCutoff" in material) {
          material.alphaCutoff = 0.5;
        }

        material.pbrMetallicRoughness.setBaseColorFactor([c[0], c[1], c[2], 0]);
      }
    }

    function toggleWake(state) {
      const viewer = document.querySelector("#boat");
      if (!viewer.model) return;

      const wake1 = viewer.model.materials.find(
        m => m.name === "Standard_373737"
      );
      const wake2 = viewer.model.materials.find(
        m => m.name === "Material.005"
      );
      const wake3 = viewer.model.materials.find(
        m => m.name === "Material.006"
      );

      applyWakeMaterial(wake1, state);
      applyWakeMaterial(wake2, state);
      applyWakeMaterial(wake3, state);
    }

function nudgeBoat() {
  const viewer = document.querySelector("#boat");
  if (!viewer) return;

  if (nudgeFrame) {
    cancelAnimationFrame(nudgeFrame);
    nudgeFrame = null;
  }

  const orbit = viewer.getCameraOrbit();
  const startTheta = Number(orbit.theta);
  const fixedPhi = orbit.phi.toString();
  const fixedRadius = orbit.radius.toString();

  const nudgeRadians = 5 * Math.PI / 180;
  const peakTheta = startTheta + nudgeRadians;
  const endTheta = startTheta;
  const duration = 520;

  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);

    let theta;
    if (progress < 0.5) {
      const p = progress / 0.5;
      theta = startTheta + (peakTheta - startTheta) * (1 - Math.pow(1 - p, 3));
    } else {
      const p = (progress - 0.5) / 0.5;
      theta = peakTheta + (endTheta - peakTheta) * (1 - Math.pow(1 - p, 3));
    }

    viewer.cameraOrbit = `${theta}rad ${fixedPhi} ${fixedRadius}`;

    if (progress < 1) {
      nudgeFrame = requestAnimationFrame(animate);
    } else {
      viewer.cameraOrbit = `${endTheta}rad ${fixedPhi} ${fixedRadius}`;
      nudgeFrame = null;
    }
  }

  nudgeFrame = requestAnimationFrame(animate);
}

    function setHull(button, color) {
      document.querySelectorAll(".exterior-swatch").forEach(btn => {
        btn.classList.remove("active");
      });

      button.classList.add("active");
      currentHullColor = color;

      animateColorChange(color, changeHull);
      nudgeBoat();
      updateConfigURL();
    }

    function setInterior(button, color) {
      document.querySelectorAll(".interior-swatch").forEach(btn => {
        btn.classList.remove("active");
      });

      button.classList.add("active");
      currentInteriorColor = color;

      animateColorChange(color, changeInterior);
      nudgeBoat();
      updateConfigURL();
    }

    function setWake(state) {
      toggleWake(state);

      const onBtn = document.querySelector("#wake-on");
      const offBtn = document.querySelector("#wake-off");

      if (state) {
        onBtn.classList.add("active");
        offBtn.classList.remove("active");
      } else {
        offBtn.classList.add("active");
        onBtn.classList.remove("active");
      }

      currentWakeState = state;
      animateColorChange("#000", () => {});
      nudgeBoat();
      updateConfigURL();
    }

    function applySavedConfig() {
      changeHull(currentHullColor);
      changeInterior(currentInteriorColor);
      toggleWake(currentWakeState);

      document.querySelectorAll(".exterior-swatch").forEach(btn => {
        btn.classList.remove("active");
        const onclickText = btn.getAttribute("onclick");
        if (onclickText && onclickText.includes(currentHullColor)) {
          btn.classList.add("active");
        }
      });

      document.querySelectorAll(".interior-swatch").forEach(btn => {
        btn.classList.remove("active");
        const onclickText = btn.getAttribute("onclick");
        if (onclickText && onclickText.includes(currentInteriorColor)) {
          btn.classList.add("active");
        }
      });

      const onBtn = document.querySelector("#wake-on");
      const offBtn = document.querySelector("#wake-off");

      if (currentWakeState) {
        onBtn.classList.add("active");
        offBtn.classList.remove("active");
      } else {
        offBtn.classList.add("active");
        onBtn.classList.remove("active");
      }
    }

    function spinBoatOnce() {
      const viewer = document.querySelector("#boat");

      const startAngle = 90;
      const endAngle = 330;
      const vertical = 75;
      const radius = "3m";
      const duration = 2500;

      const startTime = performance.now();

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);

        const angle = startAngle + (endAngle - startAngle) * eased;
        viewer.cameraOrbit = `${angle}deg ${vertical}deg ${radius}`;

        if (progress < 1) {
          requestAnimationFrame(animate);
        }
      }

      requestAnimationFrame(animate);
    }

    async function captureBoatImage() {
      const viewer = document.querySelector("#boat");

      if (!viewer || !viewer.model) {
        alert("El modelo todavía no terminó de cargar");
        return;
      }

      try {
        changeHull(currentHullColor);
        changeInterior(currentInteriorColor);
        toggleWake(currentWakeState);

        await new Promise(resolve => requestAnimationFrame(resolve));
        await new Promise(resolve => requestAnimationFrame(resolve));
        await new Promise(resolve => setTimeout(resolve, 180));

        const imageURL = viewer.toDataURL("image/png");

        const link = document.createElement("a");
        link.href = imageURL;
        link.download = "esteem-configuracion.png";
        link.click();
      } catch (error) {
        console.error("Error capturando imagen:", error);
        alert("No se pudo capturar la imagen");
      }
    }

    function setupSidebarToggle() {
      const sidebar = document.getElementById("sidebar");
      const toggle = document.getElementById("sidebarToggle");

      if (!sidebar || !toggle) return;

      toggle.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      const viewer = document.querySelector("#boat");
      const intro = document.querySelector("#intro");

      if (!viewer || !intro) return;

      loadConfigFromURL();
      setupQuoteForm();
      setupSidebarToggle();

      const hideIntro = () => {
        const introOverlay = document.querySelector(".intro-overlay");

        if (introOverlay) {
          introOverlay.style.transition = "opacity 3.5s ease-in-out";
          introOverlay.style.opacity = "0";
        }

        intro.style.transition = "opacity 2.5s ease-in-out";
        intro.style.opacity = "0";

        setTimeout(() => {
          intro.style.display = "none";
        }, 3500);
      };

      viewer.addEventListener("load", () => {
        applySavedConfig();
        hideIntro();

        setTimeout(() => {
          spinBoatOnce();
        }, 1200);
      });

      viewer.addEventListener("error", (e) => {
        console.log("ERROR CARGANDO MODELO", e);
      });

      setTimeout(() => {
        if (intro.style.display !== "none") {
          applySavedConfig();
          hideIntro();
        }
      }, 5000);
    });
  </script>
</body>
</html>>
